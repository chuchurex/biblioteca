name: Update YouTube Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Run extractor
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/youtube_extractor.py

      - name: Get statistics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/obtener_estadisticas.py

      - name: Clean descriptions
        run: python scripts/limpiar_descripciones.py

      - name: Copy data to src
        run: cp datos/biblioteca_canales.json src/data/youtube/canales.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/youtube/canales.json
          git diff --staged --quiet || git commit -m "chore: update YouTube data [skip ci]"
          git push
